<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手机足球</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="display-page">
    <main class="stadium">
      <section class="topbar" aria-label="比赛状态">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>手机足球</span>
        </div>
        <div class="scoreboard">
          <span class="team blue">蓝队</span>
          <strong id="score">0 : 0</strong>
          <span class="team red">红队</span>
        </div>
        <div class="display-actions">
          <div id="phase" class="phase">等待玩家</div>
          <button id="restartButton" class="restart-button" type="button" title="重置比分和球员位置">重新开始</button>
        </div>
      </section>

      <section class="field-wrap">
        <canvas id="game" width="1100" height="660" aria-label="足球比赛画面"></canvas>
        <div id="joinPanel" class="join-panel">
          <div class="qr-shell">
            <img id="qr" alt="扫码加入比赛" />
          </div>
          <div class="join-info">
            <h1>扫码加入比赛</h1>
            <p id="joinHint">手机扫码加入。随机均衡分队，双方各至少 1 人自动开赛，最多 20 人。</p>
            <p id="joinUrl" class="join-url"></p>
          </div>
          <span class="join-compact-label">扫码加入</span>
        </div>
        <div id="pauseBanner" class="pause-banner" hidden>比赛暂停</div>
        <div id="goalFlash" class="goal-flash" hidden></div>
      </section>

      <section class="slots" id="slots" aria-label="玩家席位"></section>
    </main>
    <script src="/field.js"></script>
    <script src="/game.js"></script>
  </body>
</html>
