# ========================================
# 3V3 手机足球 - Docker Compose 部署
# ========================================
# 使用方法（极空间 / 群晖 / 通用）:
#   1. docker compose up -d
#   2. 浏览器访问 http://你的NAS_IP:3000
#
# 方式一（推荐）: 直接拉取远程镜像，无需本地构建
# 方式二: 若无法访问 GHCR，取消下方 build 注释，运行 docker compose up -d --build
# ========================================

services:
  phone-soccer-3v3:
    image: ghcr.io/winter-tech/phone-soccer-3v3:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: phone-soccer-3v3
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
